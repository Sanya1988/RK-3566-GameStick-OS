pcm.gamestick_hw {
	type hw
	card 0
	device 0
}

ctl.gamestick_hw {
	type hw
	card 0
}

pcm.gamestick_dmix {
	type dmix
	ipc_key 2048576
	ipc_perm 0666
	slave {
		pcm "gamestick_hw"
		rate 48000
		channels 2
		format S16_LE
		period_time 0
		period_size 1024
		buffer_size 4096
	}
	bindings {
		0 0
		1 1
	}
}

pcm.!default {
	type plug
	slave.pcm "gamestick_dmix"
}

ctl.!default {
	type hw
	card 0
}
